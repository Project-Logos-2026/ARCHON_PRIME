[tool.black]
line-length = 88
target-version = ["py312"]

[tool.ruff]
target-version = "py312"
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "B", "I"]
ignore = []

[tool.ruff.lint.per-file-ignores]
"*.py" = []
"AP_SYSTEM_AUDIT/Complettion_Audit/_run_audit.py" = ["E501"]

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
warn_unused_configs = true
implicit_optional = true
disable_error_code = ["var-annotated", "import-untyped"]
exclude = [
    "ALL_ARTIFACTS_P1/",
    "AP_SYSTEM_AUDIT/",
    "STAGING_ARTIFACTS/",
]
